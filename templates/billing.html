{% extends 'base.html' %}
{% block title %}Billing Portal{% endblock %}
{% block content %}
<h2>Billing System</h2>
<a href="{{ url_for('employee') }}">Back to Dashboard</a>

<div>
    <h3>Select Item</h3>
    <select id="itemSelect"></select>
    <input type="number" id="qtyInput" placeholder="Quantity" min="1">
    <button onclick="addToCart()">Add to Cart</button>
</div>

<h3>Cart</h3>
<ul id="cartList"></ul>
<h3 id="finalTotal">Total: ₹0</h3>
<button onclick="checkout()">Process Sale</button>

<script src="{{ url_for('static', filename='billing.js') }}"></script>
{% endblock %}
